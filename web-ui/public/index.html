<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prometheus Course</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: #f5f5f5; height: 100vh; overflow: hidden; }
    .header { background: #1a1a1a; color: white; padding: 16px 20px; border-bottom: 1px solid #333; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .container { display: flex; height: calc(100vh - 60px); gap: 1px; background: #ddd; }
    .sidebar { width: 280px; background: white; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 16px; }
    .guide-section { margin-bottom: 20px; }
    .guide-section-title { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .guide-item { padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; cursor: pointer; font-size: 14px; color: #333; }
    .guide-item:hover { background: #f5f5f5; }
    .guide-item.active { background: #007acc; color: white; font-weight: 500; }
    .content { flex: 1; display: flex; flex-direction: column; background: white; overflow: hidden; }
    .guide-content { flex: 1; overflow-y: auto; padding: 32px; font-size: 15px; line-height: 1.6; }
    .guide-content h1 { font-size: 28px; margin-bottom: 20px; }
    .guide-content h2 { font-size: 20px; margin-top: 24px; margin-bottom: 12px; }
    .guide-content code { background: #f5f5f5; padding: 2px 6px; border-radius: 3px; font-family: 'Monaco', monospace; font-size: 13px; }
    .guide-content pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 4px; overflow-x: auto; margin: 12px 0; font-family: 'Monaco', monospace; font-size: 13px; }
    .guide-content pre code { background: transparent; padding: 0; color: inherit; }
    .terminal-container { flex: 1; display: flex; flex-direction: column; border-top: 1px solid #e0e0e0; background: #1e1e1e; min-height: 200px; }
    .terminal-header { background: #252526; color: #ccc; padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #3e3e42; }
    .terminal { flex: 1; overflow: hidden; padding: 12px; }
    .loading { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Prometheus Course</h1>
  </div>

  <div class="container">
    <div class="sidebar">
      <div id="guideList"></div>
    </div>

    <div class="content">
      <div class="guide-content" id="guideContent">
        <div class="loading">Loading course...</div>
      </div>

      <div class="terminal-container">
        <div class="terminal-header">Terminal</div>
        <div class="terminal" id="terminal"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    // Terminal setup
    const terminalDiv = document.getElementById('terminal');
    const term = new Terminal();
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(terminalDiv);
    fitAddon.fit();

    let ws = null;
    let wsConnected = false;

    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        wsConnected = true;
        term.write('\x1b[32mTerminal connected\x1b[0m\r\n');
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'output') {
            term.write(msg.data);
          }
        } catch (e) {
          console.error('WebSocket parse error:', e);
        }
      };

      ws.onclose = () => {
        wsConnected = false;
        term.write('\x1b[31mTerminal disconnected\x1b[0m\r\n');
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
    }

    term.onData((data) => {
      if (wsConnected && ws) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    });

    connectWebSocket();

    window.addEventListener('resize', () => {
      fitAddon.fit();
    });

    // Load guides
    async function loadGuides() {
      try {
        console.log('Fetching guides...');
        const response = await fetch('/api/guides');
        const guides = await response.json();
        console.log('Guides loaded:', guides.length);

        const guideList = document.getElementById('guideList');
        guideList.innerHTML = '';
        let currentSection = null;
        let sectionDiv = null;

        guides.forEach((guide) => {
          if (guide.section !== currentSection) {
            currentSection = guide.section;
            sectionDiv = document.createElement('div');
            sectionDiv.className = 'guide-section';

            const title = document.createElement('div');
            title.className = 'guide-section-title';
            title.textContent = guide.section;
            sectionDiv.appendChild(title);

            guideList.appendChild(sectionDiv);
          }

          const item = document.createElement('div');
          item.className = 'guide-item';
          item.textContent = guide.title;
          item.onclick = () => {
            document.querySelectorAll('.guide-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            loadGuide(guide.id);
          };

          sectionDiv.appendChild(item);
        });

        if (guides.length > 0) {
          loadGuide(guides[0].id);
          document.querySelector('.guide-item').classList.add('active');
        }
      } catch (error) {
        console.error('Failed to load guides:', error);
        document.getElementById('guideContent').innerHTML = '<div class="loading">Error loading guides: ' + error.message + '</div>';
      }
    }

    async function loadGuide(id) {
      try {
        console.log('Loading guide:', id);
        const response = await fetch(`/api/guides/${id}`);
        const data = await response.json();

        if (data.error) {
          document.getElementById('guideContent').innerHTML = '<div class="loading">Error: ' + data.error + '</div>';
          return;
        }

        function markdownToHtml(md) {
          let html = md
            // Code blocks (with or without language)
            .replace(/```[\w]*\n([\s\S]*?)```/gm, '<pre><code>$1</code></pre>')
            // Headings
            .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
            .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
            .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
            // Inline code
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            // Bold
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            // Italic
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            // Links
            .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2">$1</a>')
            // Lists
            .replace(/^\- (.*?)$/gm, '<li>$1</li>')
            .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
            // Paragraphs (replace double newlines with p tags, but not if inside pre)
            .replace(/\n\n+/g, '</p><p>');

          return '<p>' + html + '</p>';
        }

        const html = markdownToHtml(data.content);
        document.getElementById('guideContent').innerHTML = html;
      } catch (error) {
        console.error('Failed to load guide:', error);
        document.getElementById('guideContent').innerHTML = '<div class="loading">Error loading guide: ' + error.message + '</div>';
      }
    }

    // Load on page load
    setTimeout(loadGuides, 100);
  </script>
</body>
</html>
